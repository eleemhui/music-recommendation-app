name: Static Analysis

on:
  push:
    branches: ["**"]

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: api/requirements-lint.txt

      - name: Install ruff
        run: pip install -r api/requirements-lint.txt

      - name: Lint
        run: ruff check api/app

      - name: Format check
        run: ruff format --check api/app

  typecheck:
    name: Mypy (type check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            api/requirements.txt
            api/requirements-lint.txt

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r api/requirements-lint.txt

      - name: Type check
        run: mypy api/app --ignore-missing-imports
